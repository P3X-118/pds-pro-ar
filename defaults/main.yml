---
# PDS-Pro Ansible Role Defaults
#
# PDS-Pro is the SGC web admin UX that wraps `goat pds admin` with operator
# OAuth (Okta primary; Google, Microsoft, Facebook, X via goth). One PDS-Pro
# instance fronts multiple PDS instances.

pds_pro_enabled: false

pds_pro_identifier: "{{ service_id_prefix }}pds-pro"

pds_pro_base_path: "{{ sgc_playbook_base_path }}/{{ service_directory_prefix }}pds-pro"
pds_pro_etc_path: "{{ pds_pro_base_path }}/etc"
pds_pro_secrets_path: "{{ pds_pro_etc_path }}/secrets"
pds_pro_state_path: "{{ pds_pro_base_path }}/state"

pds_pro_uid: "{{ sgc_playbook_uid }}"
pds_pro_gid: "{{ sgc_playbook_gid }}"

# Container image
pds_pro_container_image: "ghcr.io/p3x-118/pds-pro:latest"
pds_pro_container_image_self_build: false

# Network
pds_pro_container_network: "{{ pds_pro_identifier }}"
pds_pro_container_additional_networks: []

pds_pro_container_additional_networks_auto: |
  {{
    ([revproxy_service_networks] if revproxy_service_networks else [])
  }}

# Listen
pds_pro_listen_addr: ":8080"
pds_pro_hostname: ""
pds_pro_base_url: "https://{{ pds_pro_hostname }}"

# Traefik
pds_pro_container_labels_traefik_enabled: "{{ traefik_labels_enabled | default(true) }}"
pds_pro_container_labels_traefik_docker_network: "{{ revproxy_service_networks }}"
# role-specific:traefik
pds_pro_container_labels_traefik_entrypoints: "{{ traefik_entrypoint_primary }}"
pds_pro_container_labels_traefik_tls_certResolver: "{{ traefik_certResolver_primary }}"
pds_pro_container_labels_traefik_rule: "Host(`{{ pds_pro_hostname }}`)"
# /role-specific:traefik

pds_pro_container_labels_traefik_additional_labels: []

# Session — secret derived from sgc_pgsk so it's stable across restarts and
# reinstalls without being checked into source.
pds_pro_session_secret: "{{ '%s' | format(sgc_pgsk) | password_hash('sha512', 'pds-pro.session', rounds=655555) | to_uuid | replace('-', '') }}"
pds_pro_session_secure: true
pds_pro_session_max_age_sec: 86400

# OAuth providers — only enabled providers are rendered into config.yaml.
# Each provider's client_secret is written to a separate file with mode 0600.
# The Okta client secret has no derivation (it's externally minted), so
# operators must supply it via group_vars / vault.
pds_pro_oauth_okta_enabled: false
pds_pro_oauth_okta_org_url: ""
pds_pro_oauth_okta_client_id: ""
pds_pro_oauth_okta_client_secret: ""

pds_pro_oauth_google_enabled: false
pds_pro_oauth_google_client_id: ""
pds_pro_oauth_google_client_secret: ""
pds_pro_oauth_google_scopes: ["email", "profile"]

pds_pro_oauth_microsoft_enabled: false
pds_pro_oauth_microsoft_client_id: ""
pds_pro_oauth_microsoft_client_secret: ""

pds_pro_oauth_facebook_enabled: false
pds_pro_oauth_facebook_client_id: ""
pds_pro_oauth_facebook_client_secret: ""
pds_pro_oauth_facebook_scopes: ["email"]

pds_pro_oauth_twitter_enabled: false
pds_pro_oauth_twitter_client_id: ""
pds_pro_oauth_twitter_client_secret: ""

# Operator allowlist. Each entry has subject (provider|user-id), email,
# email_domain, and roles. First match wins.
pds_pro_allowlist: []

# Managed PDS instances. Each entry: { name, pds_host, admin_password }.
# admin_password should match the value derived in the pds-ar role for the
# corresponding instance — typically:
#   "{{ '%s' | format(sgc_pgsk) | password_hash('sha512', 'pds.admin.<instance>', rounds=655555) | to_uuid }}"
pds_pro_instances: []

# Audit log
pds_pro_audit_db_filename: "audit.db"
pds_pro_audit_db_path: "{{ pds_pro_state_path }}/{{ pds_pro_audit_db_filename }}"

# Systemd
pds_pro_systemd_required_services_list: "{{ [sysd_docker_service] if sysd_docker_service else [] }}"
pds_pro_systemd_wanted_services_list: []
pds_pro_systemd_required_services_list_auto: "{{ [] }}"
pds_pro_systemd_wanted_services_list_auto: |
  {{
    ([(exim_relay_identifier | default('sgc-exim-relay')) ~ '.service'] if exim_relay_enabled | default(false) else [])
  }}
